<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="20" fill="#1a2d52"/>

  <!-- Bold C: outer white stroke -->
  <path d="M 67 27 A 29 29 0 1 0 67 73"
        stroke="white" stroke-width="15" fill="none"
        stroke-linecap="round"/>

  <!-- Bold C: inner navy cutout — creates double-outline frame effect -->
  <path d="M 67 27 A 29 29 0 1 0 67 73"
        stroke="#1a2d52" stroke-width="6" fill="none"
        stroke-linecap="round"/>
</svg>
