<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.98)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.80)"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.92)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.72)"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.82)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.58)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner vignette for depth -->
  <rect width="100" height="100" rx="22" fill="rgba(0,0,0,0.06)"/>
  <rect width="100" height="100" rx="22" fill="url(#bg)" opacity="0.5"/>

  <!-- Descending bar chart: 3 bars (tall → medium → short) -->
  <!-- Bar 1 – left, tallest -->
  <rect x="15" y="22" width="18" height="56" rx="5" fill="url(#bar1)"/>
  <!-- Bar 2 – center -->
  <rect x="41" y="37" width="18" height="41" rx="5" fill="url(#bar2)"/>
  <!-- Bar 3 – right, shortest -->
  <rect x="67" y="54" width="18" height="24" rx="5" fill="url(#bar3)"/>

  <!-- Trend line connecting bar tops -->
  <path d="M 24 21 L 50 36 L 76 53" stroke="white" stroke-width="2.2"
        fill="none" stroke-opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dot markers at bar tops (token nodes) -->
  <circle cx="24" cy="22" r="3.2" fill="white" opacity="0.95" filter="url(#glow)"/>
  <circle cx="50" cy="37" r="3.2" fill="white" opacity="0.90" filter="url(#glow)"/>
  <circle cx="76" cy="54" r="3.2" fill="white" opacity="0.82" filter="url(#glow)"/>
</svg>
